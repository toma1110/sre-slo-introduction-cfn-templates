AWSTemplateFormatVersion: "2010-09-09"
Description: "AWS SLO導入講座のハンズオンです。CloudWatch SLIメトリクス、SLOリスクアラーム、バーンレートアラーム、Dashboard、SNS、任意のApplication Signals SLOを作成します。"

Parameters:
  ProjectName:
    Type: String
    Default: udemy-slo-sample
    Description: リソース名とメトリクスディメンションに使うプロジェクト名です。
    AllowedPattern: "^[a-z0-9][a-z0-9-]{2,40}[a-z0-9]$"
    ConstraintDescription: 4〜42文字の小文字英数字とハイフンを指定してください。
  ServiceName:
    Type: String
    Default: sample-api
    Description: サンプルSLI Custom Metricsに使うサービスディメンションです。
    AllowedPattern: "^[a-z0-9][a-z0-9-]{1,40}[a-z0-9]$"
    ConstraintDescription: 3〜42文字の小文字英数字とハイフンを指定してください。
  NotificationEmail:
    Type: String
    Default: ""
    Description: SNS通知を受け取る任意のメールアドレスです。
    AllowedPattern: "^$|^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$"
    ConstraintDescription: 空欄、または有効なメールアドレスを指定してください。
  DashboardTitle:
    Type: String
    Default: SLO導入ダッシュボード
    Description: CloudWatch Dashboardに表示するタイトルです。
  AvailabilitySloTarget:
    Type: Number
    Default: 99.9
    Description: 可用性SLOの目標値です。エラーバジェット率は100からこの値を引いた割合です。
    MinValue: 90
    MaxValue: 99.99
  LatencyThresholdMs:
    Type: Number
    Default: 300
    Description: p99レイテンシSLOのしきい値です。単位はミリ秒です。
    MinValue: 1
    MaxValue: 60000
  ErrorRateThresholdPercent:
    Type: Number
    Default: 1
    Description: エラー率アラームのしきい値です。単位は%です。
    MinValue: 0.01
    MaxValue: 100
  FastBurnRateThreshold:
    Type: Number
    Default: 14
    Description: 高速バーンレートアラームのしきい値です。14はエラーバジェットを計画の約14倍の速度で消費している状態を表します。
    MinValue: 1
    MaxValue: 1000
  SlowBurnRateThreshold:
    Type: Number
    Default: 2
    Description: 継続的なエラーバジェット消費を検知する低速バーンレートアラームのしきい値です。
    MinValue: 0.1
    MaxValue: 1000
  EnableApplicationSignalsSlo:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: 任意のApplication Signals SLOを作成するかを指定します。サービスリンクロールの作成やSLO料金が発生する場合があります。

Conditions:
  HasNotificationEmail: !Not [!Equals [!Ref NotificationEmail, ""]]
  CreateApplicationSignalsSlo: !Equals [!Ref EnableApplicationSignalsSlo, "true"]

Resources:
  SloAlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${ProjectName}-slo-topic"
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Course
          Value: aws-slo-adoption-course

  SloEmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasNotificationEmail
    Properties:
      TopicArn: !Ref SloAlarmTopic
      Protocol: email
      Endpoint: !Ref NotificationEmail

  AvailabilityAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectName}-availability-slo-risk"
      AlarmDescription: "可用性SLIがSLO目標値を下回っています。"
      Namespace: "UdemyAICompany/SLO"
      MetricName: "Availability"
      Dimensions:
        - Name: ProjectName
          Value: !Ref ProjectName
        - Name: Service
          Value: !Ref ServiceName
      Statistic: Average
      Period: 60
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: !Ref AvailabilitySloTarget
      ComparisonOperator: LessThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref SloAlarmTopic
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Course
          Value: aws-slo-adoption-course

  LatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectName}-latency-slo-risk"
      AlarmDescription: "p99レイテンシSLIがSLOしきい値を上回っています。"
      Namespace: "UdemyAICompany/SLO"
      MetricName: "Latency"
      Dimensions:
        - Name: ProjectName
          Value: !Ref ProjectName
        - Name: Service
          Value: !Ref ServiceName
      ExtendedStatistic: p99
      Period: 60
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: !Ref LatencyThresholdMs
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref SloAlarmTopic
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Course
          Value: aws-slo-adoption-course

  ErrorRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectName}-error-rate-slo-risk"
      AlarmDescription: "ErrorCount / RequestCountから計算したエラー率がしきい値を上回っています。"
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: !Ref ErrorRateThresholdPercent
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref SloAlarmTopic
      Metrics:
        - Id: m1
          ReturnData: false
          MetricStat:
            Period: 60
            Stat: Sum
            Metric:
              Namespace: "UdemyAICompany/SLO"
              MetricName: "ErrorCount"
              Dimensions:
                - Name: ProjectName
                  Value: !Ref ProjectName
                - Name: Service
                  Value: !Ref ServiceName
        - Id: m2
          ReturnData: false
          MetricStat:
            Period: 60
            Stat: Sum
            Metric:
              Namespace: "UdemyAICompany/SLO"
              MetricName: "RequestCount"
              Dimensions:
                - Name: ProjectName
                  Value: !Ref ProjectName
                - Name: Service
                  Value: !Ref ServiceName
        - Id: e1
          Expression: "IF(m2 > 0, 100 * m1 / m2, 0)"
          Label: "エラー率 (%)"
          ReturnData: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Course
          Value: aws-slo-adoption-course

  FastBurnRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectName}-fast-burn-rate"
      AlarmDescription: "エラー率を許容エラーバジェット率で割って算出する高速バーンレートアラームです。"
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: !Ref FastBurnRateThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref SloAlarmTopic
      Metrics:
        - Id: m1
          ReturnData: false
          MetricStat:
            Period: 60
            Stat: Sum
            Metric:
              Namespace: "UdemyAICompany/SLO"
              MetricName: "ErrorCount"
              Dimensions:
                - Name: ProjectName
                  Value: !Ref ProjectName
                - Name: Service
                  Value: !Ref ServiceName
        - Id: m2
          ReturnData: false
          MetricStat:
            Period: 60
            Stat: Sum
            Metric:
              Namespace: "UdemyAICompany/SLO"
              MetricName: "RequestCount"
              Dimensions:
                - Name: ProjectName
                  Value: !Ref ProjectName
                - Name: Service
                  Value: !Ref ServiceName
        - Id: e1
          Expression: !Sub "IF(m2 > 0, (100 * m1 / m2) / (100 - ${AvailabilitySloTarget}), 0)"
          Label: "高速バーンレート"
          ReturnData: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Course
          Value: aws-slo-adoption-course

  SlowBurnRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectName}-slow-burn-rate"
      AlarmDescription: "5分周期で継続的なバーンレートを検知するアラームです。"
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 3
      DatapointsToAlarm: 3
      Threshold: !Ref SlowBurnRateThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref SloAlarmTopic
      Metrics:
        - Id: m1
          ReturnData: false
          MetricStat:
            Period: 300
            Stat: Sum
            Metric:
              Namespace: "UdemyAICompany/SLO"
              MetricName: "ErrorCount"
              Dimensions:
                - Name: ProjectName
                  Value: !Ref ProjectName
                - Name: Service
                  Value: !Ref ServiceName
        - Id: m2
          ReturnData: false
          MetricStat:
            Period: 300
            Stat: Sum
            Metric:
              Namespace: "UdemyAICompany/SLO"
              MetricName: "RequestCount"
              Dimensions:
                - Name: ProjectName
                  Value: !Ref ProjectName
                - Name: Service
                  Value: !Ref ServiceName
        - Id: e1
          Expression: !Sub "IF(m2 > 0, (100 * m1 / m2) / (100 - ${AvailabilitySloTarget}), 0)"
          Label: "低速バーンレート"
          ReturnData: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Course
          Value: aws-slo-adoption-course

  SloDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub "${ProjectName}-dashboard"
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "text",
              "x": 0,
              "y": 0,
              "width": 24,
              "height": 3,
              "properties": {
                "markdown": "# ${DashboardTitle}\\nCloudFormationで作るSLOハンズオンです。可用性、レイテンシ、エラー率、バーンレートをCloudWatch Custom Metricsで確認します。"
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 3,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "可用性SLI",
                "region": "${AWS::Region}",
                "metrics": [
                  [ "UdemyAICompany/SLO", "Availability", "ProjectName", "${ProjectName}", "Service", "${ServiceName}" ]
                ],
                "stat": "Average",
                "period": 60,
                "view": "timeSeries",
                "annotations": {
                  "horizontal": [
                    { "label": "SLO ${AvailabilitySloTarget}%", "value": ${AvailabilitySloTarget} }
                  ]
                },
                "yAxis": { "left": { "min": 95, "max": 100 } }
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 3,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "p99レイテンシSLI",
                "region": "${AWS::Region}",
                "metrics": [
                  [ "UdemyAICompany/SLO", "Latency", "ProjectName", "${ProjectName}", "Service", "${ServiceName}", { "stat": "p99" } ]
                ],
                "period": 60,
                "view": "timeSeries",
                "annotations": {
                  "horizontal": [
                    { "label": "SLO ${LatencyThresholdMs}ms", "value": ${LatencyThresholdMs} }
                  ]
                }
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 9,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "エラー率 (%)",
                "region": "${AWS::Region}",
                "metrics": [
                  [ { "expression": "IF(m2 > 0, 100 * m1 / m2, 0)", "label": "エラー率 (%)", "id": "e1", "region": "${AWS::Region}" } ],
                  [ "UdemyAICompany/SLO", "ErrorCount", "ProjectName", "${ProjectName}", "Service", "${ServiceName}", { "id": "m1", "visible": false, "stat": "Sum" } ],
                  [ ".", "RequestCount", ".", ".", ".", ".", { "id": "m2", "visible": false, "stat": "Sum" } ]
                ],
                "period": 60,
                "view": "timeSeries",
                "annotations": {
                  "horizontal": [
                    { "label": "エラー率しきい値 ${ErrorRateThresholdPercent}%", "value": ${ErrorRateThresholdPercent} }
                  ]
                }
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 9,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "バーンレート",
                "region": "${AWS::Region}",
                "metrics": [
                  [ { "expression": "IF(m2 > 0, (100 * m1 / m2) / (100 - ${AvailabilitySloTarget}), 0)", "label": "バーンレート", "id": "e1", "region": "${AWS::Region}" } ],
                  [ "UdemyAICompany/SLO", "ErrorCount", "ProjectName", "${ProjectName}", "Service", "${ServiceName}", { "id": "m1", "visible": false, "stat": "Sum" } ],
                  [ ".", "RequestCount", ".", ".", ".", ".", { "id": "m2", "visible": false, "stat": "Sum" } ]
                ],
                "period": 60,
                "view": "timeSeries",
                "annotations": {
                  "horizontal": [
                    { "label": "高速バーン ${FastBurnRateThreshold}x", "value": ${FastBurnRateThreshold} },
                    { "label": "低速バーン ${SlowBurnRateThreshold}x", "value": ${SlowBurnRateThreshold} }
                  ]
                }
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 15,
              "width": 24,
              "height": 6,
              "properties": {
                "title": "リクエスト数とエラー数",
                "region": "${AWS::Region}",
                "metrics": [
                  [ "UdemyAICompany/SLO", "RequestCount", "ProjectName", "${ProjectName}", "Service", "${ServiceName}", { "stat": "Sum", "label": "リクエスト数" } ],
                  [ ".", "ErrorCount", ".", ".", ".", ".", { "stat": "Sum", "label": "エラー数" } ]
                ],
                "period": 60,
                "view": "timeSeries"
              }
            }
          ]
        }

  OptionalLatencySlo:
    Type: AWS::ApplicationSignals::ServiceLevelObjective
    Condition: CreateApplicationSignalsSlo
    Properties:
      Name: !Sub "${ProjectName}-latency-slo"
      Description: "サンプルCloudWatchレイテンシメトリクスに対する任意のperiod-based SLOです。"
      Sli:
        SliMetric:
          MetricDataQueries:
            - MetricStat:
                Period: 60
                Metric:
                  Namespace: "UdemyAICompany/SLO"
                  MetricName: "Latency"
                  Dimensions:
                    - Name: ProjectName
                      Value: !Ref ProjectName
                    - Name: Service
                      Value: !Ref ServiceName
                Stat: "p99"
                Unit: "Milliseconds"
              Id: "latency"
              ReturnData: false
            - Id: "latencyfinal"
              ReturnData: true
              Expression: "latency * 1"
        MetricThreshold: !Ref LatencyThresholdMs
        ComparisonOperator: "LessThanOrEqualTo"
      Goal:
        Interval:
          RollingInterval:
            DurationUnit: "DAY"
            Duration: 1
        AttainmentGoal: !Ref AvailabilitySloTarget
        WarningThreshold: 95.0
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Course
          Value: aws-slo-adoption-course

Outputs:
  MetricsNamespace:
    Description: ハンズオンで使うCustom Metricsの名前空間です。
    Value: "UdemyAICompany/SLO"
  ProjectNameOutput:
    Description: サンプルメトリクスで使うProjectNameディメンション値です。
    Value: !Ref ProjectName
  ServiceNameOutput:
    Description: サンプルメトリクスで使うServiceディメンション値です。
    Value: !Ref ServiceName
  AlarmTopicArn:
    Description: SLOアラーム通知用SNS TopicのARNです。
    Value: !Ref SloAlarmTopic
  AvailabilityAlarmName:
    Description: 可用性SLOリスク用CloudWatch Alarm名です。
    Value: !Ref AvailabilityAlarm
  LatencyAlarmName:
    Description: レイテンシSLOリスク用CloudWatch Alarm名です。
    Value: !Ref LatencyAlarm
  ErrorRateAlarmName:
    Description: エラー率SLOリスク用CloudWatch Alarm名です。
    Value: !Ref ErrorRateAlarm
  FastBurnRateAlarmName:
    Description: 高速バーンレートリスク用CloudWatch Alarm名です。
    Value: !Ref FastBurnRateAlarm
  SlowBurnRateAlarmName:
    Description: 継続的なバーンレートリスク用CloudWatch Alarm名です。
    Value: !Ref SlowBurnRateAlarm
  DashboardName:
    Description: CloudWatch Dashboard名です。
    Value: !Ref SloDashboard
  OptionalLatencySloArn:
    Condition: CreateApplicationSignalsSlo
    Description: 任意で作成したApplication Signals SLOのARNです。
    Value: !Ref OptionalLatencySlo
